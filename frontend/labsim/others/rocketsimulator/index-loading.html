<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="/style.css">
    <link rel="icon" href="/multimedia/image/images.webp" type="image/x-icon">
    <title>🚀 Sugar Rocket Simulator</title>
    <style>
      .loading-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        text-align: center;
        gap: 20px;
      }

      .loading-spinner {
        width: 60px;
        height: 60px;
        border: 4px solid rgba(0, 255, 247, 0.1);
        border-top: 4px solid #00fff7;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      .rocket-icon {
        font-size: 48px;
        margin-bottom: 20px;
      }

      .loading-text h2 {
        color: #00fff7;
        margin-bottom: 10px;
      }

      .loading-text p {
        color: #dfeef0;
        font-size: 16px;
      }
    </style>
</head>
<body>
    <div class="loading-container">
        <div class="rocket-icon">🚀</div>
        <div class="loading-spinner"></div>
        <div class="loading-text">
            <h2>Sugar Rocket Simulator</h2>
            <p>Loading your interactive rocket simulation...</p>
            <p style="font-size: 14px; color: #9feeee; margin-top: 20px;">
                Crafting chemistry with precision. Design, mix, and launch your sugar rocket!
            </p>
        </div>
    </div>

    <script>
        // Redirect to the actual app after a brief delay to ensure it's ready
        // The actual app should be served at this location
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', checkForApp);
        } else {
            checkForApp();
        }

        function checkForApp() {
            setTimeout(() => {
                // Check if the Vite app has loaded
                const root = document.getElementById('root');
                if (!root) {
                    // Still loading, wait a bit more
                    setTimeout(checkForApp, 500);
                }
            }, 1000);
        }
    </script>
    <noscript>
        <p>This app requires JavaScript to run. Please enable JavaScript in your browser.</p>
    </noscript>
</body>
</html>
